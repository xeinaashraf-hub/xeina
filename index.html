<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Builder</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
}
.sidebar{
  width:300px;
  border-right:1px solid #ddd;
  padding:10px;
  overflow:auto;
}
.preview{
  flex:1;
  padding:20px;
  overflow:auto;
}
button{cursor:pointer;margin:3px}
.proj-card{
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="sidebar">

<h3>Projects</h3>
<div id="proj-list"></div>
<button onclick="addProject()">+ Add Project</button>

<hr>

<h3>Add Page</h3>
<input id="new-page" placeholder="page name">
<button onclick="addPage()">Add</button>

<hr>

<h3>Categories</h3>
<div id="cat-filter"></div>

</div>

<div class="preview" id="preview"></div>

<script>

// ===== STATE =====
const S = {
  pages: [
    {id:"landing", name:"Landing"},
    {id:"projects", name:"Projects"},
  ],
  activePage: "landing",

  projects: [
    {
      id:1,
      title:"Brand Project",
      category:"branding",
      showIn:["landing","projects"],
      visible:true,
      summary:"branding work",
      cover:""
    }
  ]
};

// ===== Categories =====
const CATEGORIES = [
  {id:"all", name:"All"},
  {id:"branding", name:"Branding"},
  {id:"social", name:"Social"},
  {id:"brand-assets", name:"Brand Assets"}
];

let activeCategory = "all";

// ===== FILTER =====
function getProjects(){
  return S.projects.filter(p=>{
    if(!p.visible) return false;

    const inPage = p.showIn.includes(S.activePage);
    const inCat = activeCategory==="all" || p.category===activeCategory;

    return inPage && inCat;
  });
}

// ===== RENDER =====
function render(){

  // preview
  const projects = getProjects().map(p=>`
    <div class="proj-card">
      <h3>${p.title}</h3>
      <p>${p.summary}</p>
    </div>
  `).join("");

  document.getElementById("preview").innerHTML = `
    <h1>${S.activePage}</h1>
    ${projects}
  `;

  // project panel
  document.getElementById("proj-list").innerHTML =
  S.projects.map((p,i)=>`
    <div style="border:1px solid #ccc;padding:5px;margin-bottom:5px">

      <input value="${p.title}" 
      onchange="S.projects[${i}].title=this.value;render()">

      <br>

      <select onchange="S.projects[${i}].category=this.value;render()">
        <option ${p.category=="branding"?"selected":""}>branding</option>
        <option ${p.category=="social"?"selected":""}>social</option>
        <option ${p.category=="brand-assets"?"selected":""}>brand-assets</option>
      </select>

      <br>

      show in:
      <label>
        <input type="checkbox" ${p.showIn.includes("landing")?"checked":""}
        onchange="toggleShow(${i},'landing',this.checked)">
        landing
      </label>

      <label>
        <input type="checkbox" ${p.showIn.includes("projects")?"checked":""}
        onchange="toggleShow(${i},'projects',this.checked)">
        projects
      </label>

      <br>

      <select onchange="S.projects[${i}].visible=this.value==='1';render()">
        <option value="1" ${p.visible?"selected":""}>Show</option>
        <option value="0" ${!p.visible?"selected":""}>Hide</option>
      </select>

      <button onclick="deleteProject(${i})">X</button>

    </div>
  `).join("");

  // categories
  document.getElementById("cat-filter").innerHTML =
  CATEGORIES.map(c=>`
    <button onclick="setCategory('${c.id}')">
      ${c.name}
    </button>
  `).join("");
}

// ===== HELPERS =====
function toggleShow(i,page,val){
  const arr = S.projects[i].showIn;

  if(val){
    if(!arr.includes(page)) arr.push(page);
  }else{
    S.projects[i].showIn = arr.filter(x=>x!==page);
  }

  render();
}

function setCategory(cat){
  activeCategory = cat;
  render();
}

// ===== PROJECT =====
function addProject(){
  S.projects.push({
    id:Date.now(),
    title:"New Project",
    category:"branding",
    showIn:["projects"],
    visible:true,
    summary:""
  });
  render();
}

function deleteProject(i){
  S.projects.splice(i,1);
  render();
}

// ===== PAGES =====
function addPage(){
  const name = document.getElementById("new-page").value.trim();
  if(!name) return;

  const id = name.toLowerCase().replace(/\s+/g,'-');

  S.pages.push({id,name});
  S.activePage = id;

  render();
}

// ===== INIT =====
render();

</script>

</body>
</html>
